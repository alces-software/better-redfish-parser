services:
  frontend:
    image: node:latest
    container_name: frontend
    ports:
      - 3000:3000
    working_dir: /srv/app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ./frontend:/srv/app
      - frontend_node_modules:/srv/app/node_modules
    depends_on:
      - backend
    tty: true

  backend:
    image: node:latest
    container_name: backend
    ports:
      - 81:3000
    working_dir: /srv/app
    command: "./setup.sh"
    volumes:
      - ./backend:/srv/app
    tty: true

  database:
    image: mongo:latest
    container_name: database
    ports:
      - 27017:27017
    volumes:
      - dbdata6:/data/db

volumes:
  dbdata6:
  frontend_node_modules:
