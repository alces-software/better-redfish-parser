services:
  frontend:
    image: node:latest
    container_name: frontend
    expose:
      - 3000
    working_dir: /srv/app
    command: "./setup.sh"
    volumes:
      - ./frontend:/srv/app
    depends_on:
      - backend
    tty: true

  backend:
    image: node:latest
    container_name: backend
    expose:
      - 3000
    working_dir: /srv/app
    command: "./setup.sh"
    volumes:
      - ./backend:/srv/app
    depends_on:
      - database
    tty: true

  database:
    image: mongo:latest
    container_name: database
    ports:
      - 27017:27017
    volumes:
      - dbdata6:/data/db
  
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  dbdata6:
